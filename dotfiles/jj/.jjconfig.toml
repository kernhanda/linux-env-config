# Jujutsu (jj) user configuration. Stowed to ~/.jjconfig.toml.
#
# jj is pre-1.0 and ships breaking changes roughly monthly; pin a jj version
# (>= 0.41) and re-audit these keys on upgrade. Tested against jj 0.41.0.

[user]
name = "Kern Handa"
email = "kern.handa@gmail.com"

[templates]
# Push bookmarks under the kern/ prefix (personal-branch convention).
# `jj git push -c @` then auto-creates a kern/<change_id> bookmark and pushes it;
# re-pushing after an edit moves the same bookmark (one change == one PR branch).
git_push_bookmark = '"kern/" ++ change_id.short()'

[snapshot]
# Monorepos legitimately contain files above the 1MiB default, which jj would
# otherwise refuse to snapshot.
max-new-file-size = "2GiB"

[template-aliases]
# `jj log` node template that annotates the working-copy commit (@) with its
# uncommitted file changes, so a bare `jj` shows both the graph and what `jj st`
# lists. `status` has no graph mode and `log` no working-copy summary; this
# bridges them. Only `@` is annotated, and only when it's non-empty.
'log_with_working_copy' = '''
builtin_log_compact ++
if(current_working_copy && !empty,
  "Working copy changes:\n" ++ self.diff().summary())
'''

[ui]
# Bare `jj` (no subcommand) prints the log graph with working-copy changes (see
# template-aliases.log_with_working_copy). Plain `jj log` keeps the default
# template.
default-command = ["log", "-T", "log_with_working_copy"]
# Interactive diff selection (diffedit/split/squash -i) uses hunk.nvim, which
# jj launches via the :DiffEditor command. diff-instructions = false drops the
# JJ-INSTRUCTIONS pseudo-file so it isn't a node in hunk's file tree.
diff-editor = ["nvim", "-c", "DiffEditor $left $right $output"]
diff-instructions = false

[aliases]
# Push the whole current stack as tracked kern/<id> bookmarks, dropping the
# empty working-copy change so `jj push-stack` mirrors what `jpr` pushes.
push-stack = ["git", "push", "-c", "(trunk()..@) ~ empty()"]
# Push just the current change.
push-this = ["git", "push", "-c", "@"]
# Subcommand shorthands.
fetch = ["git", "fetch"]
track = ["bookmark", "track"]
prep = ["rebase", "-d", "main@origin"]

[colors."diff added"]
fg = "#a6e3a1"

[colors."diff removed"]
fg = "#f38ba8"

[colors."diff token"]
underline = false

[merge-tools.wdiff]
program = "/home/ubuntu/work/dotfiles/dotfiles/jj/wdiff-linenum.sh"
diff-args = ["$left","$right"]
